<!DOCTYPE html>
<!--
  FILE        : register.html
  PROJECT     : SECU2000 - ClinicBook : Secure Clinic Booking System
  PROGRAMMER  : Juan Felipe Montero Cortes
  FIRST VERSION: 2026-04-11
  DESCRIPTION :
    Registration page for new patient and doctor accounts. Toggles the
    doctor-specific fields (specialty, license number, bio) based on the
    selected role. Submits the form data to the API and redirects to login
    on success.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicBook – Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="card p-4" style="width:100%;max-width:460px;">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-primary">ClinicBook</h4>
            <p class="text-muted mb-0">Create an account</p>
        </div>
        <div id="alert" class="alert d-none" role="alert"></div>
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="full_name" class="form-control" required minlength="2" maxlength="100">
            </div>
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required minlength="8">
                <div class="form-text">Min. 8 characters, one uppercase, one number.</div>
            </div>
            <div class="mb-3">
                <label class="form-label">I am registering as</label>
                <select id="role" class="form-select" required>
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                </select>
            </div>
            <div id="doctorFields">
                <div class="mb-3">
                    <label class="form-label">Specialty</label>
                    <input type="text" id="specialty" class="form-control" maxlength="100">
                </div>
                <div class="mb-3">
                    <label class="form-label">License Number</label>
                    <input type="text" id="license_number" class="form-control" maxlength="50">
                </div>
                <div class="mb-3">
                    <label class="form-label">Short Bio <span class="text-muted">(optional)</span></label>
                    <textarea id="bio" class="form-control" rows="2" maxlength="300"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submitBtn">Create Account</button>
        </form>
        <hr>
        <p class="text-center mb-0 text-muted small">
            Already have an account? <a href="/index.html">Sign in</a>
        </p>
    </div>

    <script src="/js/register.js"></script>
</body>
</html>
