<!DOCTYPE html>
<!--
  FILE        : search.html
  PROJECT     : SECU2000 - ClinicBook : Secure Clinic Booking System
  PROGRAMMER  : Juan Felipe Montero Cortes
  FIRST VERSION: 2026-04-11
  DESCRIPTION :
    Doctor search page for patients. Provides name and specialty filter
    inputs that query the API and display matching doctor cards. Each card
    has a Book button that opens a modal to select a date and confirm the
    appointment.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicBook – Find a Doctor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard.html">ClinicBook</a>
            <div class="d-flex align-items-center gap-3">
                <a href="/dashboard.html" class="btn btn-outline-light btn-sm">My Dashboard</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h5 class="mb-3">Find a Doctor</h5>

        <div class="card p-3 mb-4">
            <div class="row g-2">
                <div class="col-md-5">
                    <input type="text" id="searchName" class="form-control" placeholder="Search by name...">
                </div>
                <div class="col-md-4">
                    <select id="searchSpecialty" class="form-select">
                        <option value="">All Specialties</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" id="searchBtn">Search</button>
                </div>
            </div>
        </div>

        <div id="alert" class="alert d-none" role="alert"></div>
        <div id="results"></div>
    </div>

    <!-- Booking Modal -->
    <div class="modal fade" id="bookModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Book Appointment</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-3">Booking with <strong id="modalDoctorName"></strong></p>
                    <div class="mb-3">
                        <label class="form-label">Date & Time</label>
                        <input type="datetime-local" id="scheduledAt" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notes <span class="text-muted">(optional)</span></label>
                        <textarea id="bookNotes" class="form-control" rows="2" maxlength="500"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="confirmBookBtn">Confirm Booking</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/search.js"></script>
</body>
</html>
