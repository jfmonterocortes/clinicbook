<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicBook – Doctor View</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/doctor.html">ClinicBook</a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small" id="userName"></span>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h5 class="mb-1">My Appointments</h5>
        <p class="text-muted small mb-3">Manage your patient appointments and view uploaded documents.</p>

        <div id="alert" class="alert d-none" role="alert"></div>

        <!-- Filter -->
        <div class="mb-3">
            <select id="statusFilter" class="form-select" style="max-width:200px;">
                <option value="">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>
        </div>

        <div id="appointmentsContainer"><p class="text-muted">Loading...</p></div>

        <h5 class="mt-4 mb-3">Patient Documents</h5>
        <div id="documentsContainer"><p class="text-muted">Loading...</p></div>
    </div>

    <script src="/js/doctor.js"></script>
</body>
</html>
