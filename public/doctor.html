<!DOCTYPE html>
<!--
  FILE        : doctor.html
  PROJECT     : SECU2000 - ClinicBook : Secure Clinic Booking System
  PROGRAMMER  : Juan Felipe Montero Cortes
  FIRST VERSION: 2026-04-11
  DESCRIPTION :
    Doctor dashboard page. Shows the doctor's appointments with status
    filter and update controls (confirm, complete, cancel). Displays
    documents uploaded by patients linked to the doctor's appointments.
    Provides a modal form for booking appointments on behalf of patients.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicBook – Doctor View</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/doctor.html">ClinicBook</a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small" id="userName"></span>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h5 class="mb-1">My Appointments</h5>
        <p class="text-muted small mb-3">Manage your patient appointments and view uploaded documents.</p>

        <div id="alert" class="alert d-none" role="alert"></div>

        <!-- Filter + Book -->
        <div class="d-flex gap-2 mb-3 flex-wrap">
            <select id="statusFilter" class="form-select" style="max-width:200px;">
                <option value="">All Statuses</option>
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
            </select>
            <button class="btn btn-outline-secondary btn-sm" id="refreshBtn">Refresh</button>
            <button class="btn btn-success btn-sm ms-auto" data-bs-toggle="modal" data-bs-target="#bookModal">+ Book Appointment</button>
        </div>

        <!-- Book Appointment Modal -->
        <div class="modal fade" id="bookModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Book Appointment</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="bookAlert" class="alert d-none"></div>
                        <div class="mb-3">
                            <label class="form-label">Patient</label>
                            <select id="bookPatient" class="form-select">
                                <option value="">Select patient...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Date &amp; Time</label>
                            <input type="datetime-local" id="bookDate" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notes <span class="text-muted small">(optional)</span></label>
                            <textarea id="bookNotes" class="form-control" rows="2" maxlength="500"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-success" id="bookSubmitBtn">Book</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="appointmentsContainer"><p class="text-muted">Loading...</p></div>

        <h5 class="mt-4 mb-3">Patient Documents</h5>
        <div id="documentsContainer"><p class="text-muted">Loading...</p></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/doctor.js"></script>
</body>
</html>
