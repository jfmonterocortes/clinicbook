<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicBook – Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="card p-4" style="width:100%;max-width:400px;">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-primary">ClinicBook</h4>
            <p class="text-muted mb-0">Sign in to your account</p>
        </div>
        <div id="alert" class="alert d-none" role="alert"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" id="email" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submitBtn">Sign In</button>
        </form>
        <hr>
        <p class="text-center mb-0 text-muted small">
            Don't have an account? <a href="/register.html">Register</a>
        </p>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
