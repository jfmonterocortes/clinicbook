<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicBook – Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/admin.html">ClinicBook <span class="badge bg-danger ms-1">Admin</span></a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small" id="userName"></span>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <ul class="nav nav-tabs" id="adminTabs">
            <li class="nav-item">
                <a class="nav-link active" href="#" data-tab="users">Users</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-tab="appointments">Appointments</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-tab="audit">Audit Log</a>
            </li>
        </ul>

        <div id="alert" class="alert d-none mt-3" role="alert"></div>

        <!-- Users Tab -->
        <div id="tab-users" class="tab-content">
            <h6>All Users</h6>
            <div class="table-responsive">
                <table class="table table-sm table-hover bg-white rounded">
                    <thead class="table-light">
                        <tr><th>Name</th><th>Email</th><th>Role</th><th>Specialty</th><th>Status</th><th>Action</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Appointments Tab -->
        <div id="tab-appointments" class="tab-content d-none">
            <h6>All Appointments</h6>
            <div class="table-responsive">
                <table class="table table-sm table-hover bg-white rounded">
                    <thead class="table-light">
                        <tr><th>Patient</th><th>Doctor</th><th>Specialty</th><th>Date</th><th>Status</th></tr>
                    </thead>
                    <tbody id="appointmentsTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Audit Tab -->
        <div id="tab-audit" class="tab-content d-none">
            <h6>Audit Log <span class="text-muted small">(last 200 entries)</span></h6>
            <div class="table-responsive">
                <table class="table table-sm table-hover bg-white rounded">
                    <thead class="table-light">
                        <tr><th>Time</th><th>User</th><th>Action</th><th>IP</th><th>Detail</th></tr>
                    </thead>
                    <tbody id="auditTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
