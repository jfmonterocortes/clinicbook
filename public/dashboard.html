<!DOCTYPE html>
<!--
  FILE        : dashboard.html
  PROJECT     : SECU2000 - ClinicBook : Secure Clinic Booking System
  PROGRAMMER  : Juan Felipe Montero Cortes
  FIRST VERSION: 2026-04-11
  DESCRIPTION :
    Patient dashboard page. Displays the patient's upcoming appointments
    and uploaded medical documents. Provides controls to cancel pending
    or confirmed appointments and a form to upload new documents optionally
    linked to a specific appointment.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClinicBook – My Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard.html">ClinicBook</a>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small" id="userName"></span>
                <a href="/search.html" class="btn btn-light btn-sm">Book Appointment</a>
                <button class="btn btn-outline-light btn-sm" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h5 class="mb-3">My Appointments</h5>
        <div id="alert" class="alert d-none" role="alert"></div>

        <!-- Upload document section -->
        <div class="card mb-4 p-3">
            <h6 class="mb-2">Upload Medical Document</h6>
            <form id="uploadForm" class="d-flex gap-2 align-items-end flex-wrap">
                <div>
                    <label class="form-label mb-1 small">Link to Appointment (optional)</label>
                    <select id="apptSelect" class="form-select form-select-sm" style="min-width:200px;">
                        <option value="">— None —</option>
                    </select>
                </div>
                <div>
                    <label class="form-label mb-1 small">File (PDF / PNG / JPG, max 2 MB)</label>
                    <input type="file" id="fileInput" class="form-control form-control-sm" accept=".pdf,.png,.jpg,.jpeg">
                </div>
                <button type="submit" class="btn btn-secondary btn-sm">Upload</button>
            </form>
        </div>

        <!-- Appointments list -->
        <div id="appointmentsContainer">
            <p class="text-muted">Loading appointments...</p>
        </div>

        <!-- My Documents -->
        <h5 class="mt-4 mb-3">My Documents</h5>
        <div id="documentsContainer">
            <p class="text-muted">Loading documents...</p>
        </div>
    </div>

    <script src="/js/dashboard.js"></script>
</body>
</html>
